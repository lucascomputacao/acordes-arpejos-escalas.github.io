name: tests

# Guards the arpeggio (and future) data against silent regressions.
# Runs on every push and pull request.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # The data tests use only Node's built-in test runner — no install needed.
      - name: Run tests
        run: node --test chord-atlas/tests/*.test.js
