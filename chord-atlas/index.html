<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chord Atlas - Chord Scale Arpegios Modes Compatibility</title>
<link rel="stylesheet" href="styles.css?v=9" />
</head>
<body>
<div class="mobile-topbar" aria-label="Mobile navigation">
  <button id="mobileMenuButton" class="mobile-menu-button" type="button" aria-controls="sidebar" aria-expanded="false">☰ <span data-i18n="controls">Controls</span></button>
  <div class="mobile-brand">Chord Atlas</div>
</div>
<div class="app">
<aside id="sidebar" class="sidebar" aria-label="Controls">
  <div class="sidebar-mobile-head">
    <strong>Chord Atlas</strong>
    <button id="mobileCloseButton" class="sidebar-close" type="button" aria-label="Close controls">×</button>
  </div>
  <div class="panel">
    <h3 data-i18n="controls">Controles</h3>
    <div class="field"><label for="root" data-i18n="root">Tonalidade</label><select id="root"></select></div>
    <div class="field"><label for="structure" data-i18n="structure">Estrutura</label><select id="structure"></select></div>
    <div class="field"><label data-i18n="region">Fretboard region</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><label for="minFret" data-i18n="minFret">Start fret</label><input id="minFret" type="number" min="0" max="24" value="0"></div><div><label for="maxFret" data-i18n="maxFret">Final fret</label><input id="maxFret" type="number" min="1" max="24" value="24"></div></div><div class="quick"><button class="secondary" onclick="setRegion(0,12)">0-12</button><button class="secondary" onclick="setRegion(0,24)">0-24</button><button class="secondary" onclick="setRegion(5,12)">5-12</button></div></div>
  </div>
  <div class="panel">
    <h3 data-i18n="stringGroups">String groups</h3>
    <div id="stringGroups" class="checkgrid"></div>
    <div class="small-actions"><button class="secondary" onclick="toggleAll('#stringGroups input',true)">Todos</button><button class="secondary" onclick="toggleAll('#stringGroups input',false)">Limpar</button></div>
  </div>
  <div class="panel">
    <h3 data-i18n="voicings">Voicings</h3>
    <div id="voicings"></div>
    <div class="small-actions"><button class="secondary" onclick="toggleAll('#voicings input',true)">Todos</button><button class="secondary" onclick="toggleAll('#voicings input',false)">Limpar</button></div>
  </div>
  <div class="panel" id="scaleSuggestionsPanel">
    <h3 data-i18n="scaleSuggestions">Scale suggestions</h3>
    <div id="scaleSuggestions" class="suggestion-list"></div>
  </div>
  <div class="panel" id="tensionsPanel">
    <h3 data-i18n="availableTensions">Available tensions</h3>
    <div id="availableTensions"></div>
  </div>
  <div class="panel" id="compatibilityPanel">
    <h3 data-i18n="compatibleChords">Compatible chords</h3>
    <div id="compatibleChords"></div>
  </div>
  <div class="panel" id="voiceLeadingPanel">
    <h3 data-i18n="voiceLeading">Voice leading</h3>
    <div class="vl-controls">
      <label data-i18n="fromChord">From chord</label>
      <div class="vl-row"><select id="vlRootA"></select><select id="vlStructA"></select></div>
      <label data-i18n="toChord">To chord</label>
      <div class="vl-row"><select id="vlRootB"></select><select id="vlStructB"></select></div>
      <button class="secondary" type="button" onclick="requestVoiceLeading()" data-i18n="findClosest">Find closest voicings</button>
    </div>
  </div>
  <div class="panel">
    <h3>Render</h3>
    <div class="export-row"><button onclick="exportSVG()">SVG</button><button onclick="exportPNG()">PNG</button></div>
    <div class="quick"><button class="secondary" onclick="printChordAtlas()" data-i18n="print">Print</button></div>
    <div id="status" class="status"></div>
  </div>
</aside>
<div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>
<main class="main">
<header>
  <div class="lang-switch"><button id="lang-pt" type="button">🇧🇷 PT</button><button id="lang-en" class="active" type="button">🇺🇸 EN</button></div>
  <h1 data-i18n="title">Chord Atlas</h1>
  <div class="subtitle" data-i18n="subtitle">Chords, arpeggios, scales, modes, drop 2 and shell voicings</div>
</header>
<div class="tabs" id="tabs"></div>
<div class="floating-selector" id="floatingSelector" aria-label="Quick key and structure">
  <div class="fs-field">
    <label for="floatingRoot" data-i18n="root">Tonalidade</label>
    <select id="floatingRoot"></select>
  </div>
  <div class="fs-field fs-field-structure">
    <label for="floatingStructure" data-i18n="structure">Estrutura</label>
    <select id="floatingStructure"></select>
  </div>
  <button type="button" id="floatingClear" class="fs-clear" data-i18n="clearStructure" style="display:none">Limpar</button>
  <div class="inv-row" id="inversionRow" style="display:none">
    <span class="inv-label" data-i18n="inversions">Inversões</span>
    <div class="inv-pills">
      <button type="button" class="inv-pill active" data-mode="root" data-i18n="invRoot">Só fundamental</button>
      <button type="button" class="inv-pill" data-mode="all" data-i18n="invAll">Todas</button>
      <button type="button" class="inv-pill" data-mode="select" data-i18n="invSelect">Selecionar</button>
    </div>
    <div class="inv-sel" id="inversionSelectRow" style="display:none">
      <label class="inv-sel-item"><input type="checkbox" value="1st"> <span data-i18n="inv1st">1ª inv.</span></label>
      <label class="inv-sel-item"><input type="checkbox" value="2nd"> <span data-i18n="inv2nd">2ª inv.</span></label>
      <label class="inv-sel-item" data-inv="3rd"><input type="checkbox" value="3rd"> <span data-i18n="inv3rd">3ª inv.</span></label>
    </div>
  </div>
</div>
<div id="output"></div>
<div id="voiceLeadingOutput"></div>
</main>
</div>
<script src="i18n.js?v=2"></script>
<script src="music-engine.js?v=36"></script>
<script src="renderer.js?v=12"></script>
<script src="app.js?v=9"></script>
<!-- Playable diagrams: Tone.js sample engine + click-to-play integration -->
<script src="tone.js"></script>
<script src="audio-engine-samples.js?v=2"></script>
<script src="diagram-audio.js?v=3"></script>
</body>
</html>
