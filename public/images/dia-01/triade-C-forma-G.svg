<svg width="700" height="300" xmlns="http://www.w3.org/2000/svg">
    <rect width="700" height="300" fill="white"/>

    <!-- Título -->
    <text x="20" y="20" text-anchor="start" font-size="14" font-weight="bold">C Major - Forma G (4ª corda)</text>

    <!-- Nut (capo) - linha vertical no topo -->
    <rect x="25" y="50" width="8" height="210.0" fill="black" stroke="black" stroke-width="2"/>

    <!-- Cordas (linhas horizontais) -->
    <line x1="25" y1="50.0" x2="348.0" y2="50.0" stroke="black" stroke-width="2"/>
    <line x1="25" y1="92.0" x2="348.0" y2="92.0" stroke="black" stroke-width="2"/>
    <line x1="25" y1="134.0" x2="348.0" y2="134.0" stroke="black" stroke-width="2"/>
    <line x1="25" y1="176.0" x2="348.0" y2="176.0" stroke="black" stroke-width="2"/>
    <line x1="25" y1="218.0" x2="348.0" y2="218.0" stroke="black" stroke-width="2"/>
    <line x1="25" y1="260.0" x2="348.0" y2="260.0" stroke="black" stroke-width="2"/>

    <!-- Trastes (linhas verticais) -->
    <line x1="103" y1="50" x2="103" y2="260.0" stroke="black" stroke-width="1"/>
    <text x="103" y="280.0" text-anchor="middle" font-size="12" fill="gray">1</text>
    <line x1="173" y1="50" x2="173" y2="260.0" stroke="black" stroke-width="1"/>
    <text x="173" y="280.0" text-anchor="middle" font-size="12" fill="gray">2</text>
    <line x1="243" y1="50" x2="243" y2="260.0" stroke="black" stroke-width="1"/>
    <text x="243" y="280.0" text-anchor="middle" font-size="12" fill="gray">3</text>
    <line x1="313" y1="50" x2="313" y2="260.0" stroke="black" stroke-width="1"/>
    <text x="313" y="280.0" text-anchor="middle" font-size="12" fill="gray">4</text>

    <!-- Posições dos dedos -->
    <circle cx="15" cy="50.0" r="6" fill="none" stroke="black" stroke-width="2"/>
    <circle cx="138.0" cy="92.0" r="10" fill="#2196F3" stroke="black" stroke-width="2"/>
    <text x="138.0" y="92.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="white">2</text>
    <circle cx="15" cy="134.0" r="6" fill="none" stroke="black" stroke-width="2"/>
    <line x1="10" y1="168.0" x2="20" y2="184.0" stroke="black" stroke-width="2"/>
    <line x1="20" y1="168.0" x2="10" y2="184.0" stroke="black" stroke-width="2"/>
    <line x1="10" y1="210.0" x2="20" y2="226.0" stroke="black" stroke-width="2"/>
    <line x1="20" y1="210.0" x2="10" y2="226.0" stroke="black" stroke-width="2"/>
    <line x1="10" y1="252.0" x2="20" y2="268.0" stroke="black" stroke-width="2"/>
    <line x1="20" y1="252.0" x2="10" y2="268.0" stroke="black" stroke-width="2"/>
</svg>