<svg width="700" height="300" xmlns="http://www.w3.org/2000/svg">
    <rect width="700" height="300" fill="white"/>

    <!-- Título -->
    <text x="20" y="20" text-anchor="start" font-size="14" font-weight="bold">C Minor - Forma E (6ª corda)</text>

    <!-- Nut (capo) - linha horizontal no topo -->
    <rect x="25" y="50" width="210.0" height="8" fill="black" stroke="black" stroke-width="2"/>

    <!-- Cordas (linhas verticais) -->
    <line x1="25.0" y1="50" x2="25.0" y2="373.0" stroke="black" stroke-width="2"/>
    <line x1="67.0" y1="50" x2="67.0" y2="373.0" stroke="black" stroke-width="2"/>
    <line x1="109.0" y1="50" x2="109.0" y2="373.0" stroke="black" stroke-width="2"/>
    <line x1="151.0" y1="50" x2="151.0" y2="373.0" stroke="black" stroke-width="2"/>
    <line x1="193.0" y1="50" x2="193.0" y2="373.0" stroke="black" stroke-width="2"/>
    <line x1="235.0" y1="50" x2="235.0" y2="373.0" stroke="black" stroke-width="2"/>

    <!-- Trastes (linhas horizontais) -->
    <line x1="25" y1="128" x2="235.0" y2="128" stroke="black" stroke-width="1"/>
    <line x1="25" y1="198" x2="235.0" y2="198" stroke="black" stroke-width="1"/>
    <line x1="25" y1="268" x2="235.0" y2="268" stroke="black" stroke-width="1"/>
    <line x1="25" y1="338" x2="235.0" y2="338" stroke="black" stroke-width="1"/>
    <text x="60.0" y="393.0" text-anchor="middle" font-size="12" fill="gray">0</text>
    <text x="130.0" y="393.0" text-anchor="middle" font-size="12" fill="gray">1</text>
    <text x="200.0" y="393.0" text-anchor="middle" font-size="12" fill="gray">2</text>
    <text x="270.0" y="393.0" text-anchor="middle" font-size="12" fill="gray">3</text>

    <!-- Posições dos dedos -->
    <line x1="17.0" y1="35" x2="33.0" y2="45" stroke="black" stroke-width="2"/>
    <line x1="33.0" y1="35" x2="17.0" y2="45" stroke="black" stroke-width="2"/>
    <line x1="59.0" y1="35" x2="75.0" y2="45" stroke="black" stroke-width="2"/>
    <line x1="75.0" y1="35" x2="59.0" y2="45" stroke="black" stroke-width="2"/>
    <circle cx="109.0" cy="93.0" r="10" fill="black" stroke="black" stroke-width="2"/>
    <circle cx="151.0" cy="163.0" r="10" fill="black" stroke="black" stroke-width="2"/>
    <circle cx="193.0" cy="233.0" r="10" fill="black" stroke="black" stroke-width="2"/>
    <line x1="227.0" y1="35" x2="243.0" y2="45" stroke="black" stroke-width="2"/>
    <line x1="243.0" y1="35" x2="227.0" y2="45" stroke="black" stroke-width="2"/>
</svg>