<svg width="500" height="200" xmlns="http://www.w3.org/2000/svg">
    <rect width="500" height="200" fill="white"/>

    <!-- Título -->
    <text x="20" y="20" text-anchor="start" font-size="14" font-weight="bold">C Diminished (Dó diminuto)</text>

    <!-- Nut (capo) - linha vertical no topo -->
    <rect x="60" y="30" width="6" height="120.0" fill="black" stroke="black" stroke-width="2"/>

    <!-- Cordas (linhas horizontais) -->
    <line x1="60" y1="30.0" x2="246.0" y2="30.0" stroke="black" stroke-width="2"/>
    <line x1="60" y1="54.0" x2="246.0" y2="54.0" stroke="black" stroke-width="2"/>
    <line x1="60" y1="78.0" x2="246.0" y2="78.0" stroke="black" stroke-width="2"/>
    <line x1="60" y1="102.0" x2="246.0" y2="102.0" stroke="black" stroke-width="2"/>
    <line x1="60" y1="126.0" x2="246.0" y2="126.0" stroke="black" stroke-width="2"/>
    <line x1="60" y1="150.0" x2="246.0" y2="150.0" stroke="black" stroke-width="2"/>

    <!-- Trastes (linhas verticais) -->
    <line x1="106" y1="30" x2="106" y2="150.0" stroke="black" stroke-width="1"/>
    <text x="106" y="170.0" text-anchor="middle" font-size="12" fill="gray">1</text>
    <line x1="146" y1="30" x2="146" y2="150.0" stroke="black" stroke-width="1"/>
    <text x="146" y="170.0" text-anchor="middle" font-size="12" fill="gray">2</text>
    <line x1="186" y1="30" x2="186" y2="150.0" stroke="black" stroke-width="1"/>
    <text x="186" y="170.0" text-anchor="middle" font-size="12" fill="gray">3</text>
    <line x1="226" y1="30" x2="226" y2="150.0" stroke="black" stroke-width="1"/>
    <text x="226" y="170.0" text-anchor="middle" font-size="12" fill="gray">4</text>

    <!-- Posições dos dedos -->
    <line x1="45" y1="22.0" x2="55" y2="38.0" stroke="black" stroke-width="2"/>
    <line x1="55" y1="22.0" x2="45" y2="38.0" stroke="black" stroke-width="2"/>
    <line x1="45" y1="46.0" x2="55" y2="62.0" stroke="black" stroke-width="2"/>
    <line x1="55" y1="46.0" x2="45" y2="62.0" stroke="black" stroke-width="2"/>
    <circle cx="86.0" cy="78.0" r="10" fill="#2196F3" stroke="black" stroke-width="2"/>
    <text x="86.0" y="78.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="white">1</text>
    <circle cx="86.0" cy="102.0" r="10" fill="#2196F3" stroke="black" stroke-width="2"/>
    <text x="86.0" y="102.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="white">1</text>
    <circle cx="166.0" cy="126.0" r="10" fill="#2196F3" stroke="black" stroke-width="2"/>
    <text x="166.0" y="126.0" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="white">3</text>
    <line x1="45" y1="142.0" x2="55" y2="158.0" stroke="black" stroke-width="2"/>
    <line x1="55" y1="142.0" x2="45" y2="158.0" stroke="black" stroke-width="2"/>
</svg>