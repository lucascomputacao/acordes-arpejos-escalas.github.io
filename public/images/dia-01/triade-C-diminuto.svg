    <text x="10" y="336.0" text-anchor="end" font-size="12" fill="gray">4</text>

    <!-- Posições dos dedos -->
    <line x1="18.0" y1="40" x2="42.0" y2="52" stroke="black" stroke-width="2"/>
    <line x1="42.0" y1="40" x2="18.0" y2="52" stroke="black" stroke-width="2"/>
    <line x1="66.0" y1="40" x2="90.0" y2="52" stroke="black" stroke-width="2"/>
